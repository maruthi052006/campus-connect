<nav class="navbar navbar-expand-lg fixed-top bg-white" id="mainNavbar">
  <div class="navbar-inner d-flex align-items-center w-100">

    <!-- Hamburger Menu (Mobile Only) -->
    <button class="nav-icon-btn d-lg-none me-2" id="sidebarToggleGlobal">
      <i class="bi bi-list"></i>
    </button>

    <!-- Logo -->
    <a class="navbar-brand fw-800 text-primary me-3 d-flex align-items-center gap-2" href="{% url 'feed:home' %}">
      <span style="letter-spacing: -0.5px; font-size: 1.35rem;">Campus<span class="text-dark">Connect</span></span>
    </a>

    <!-- Search (desktop) -->
    <div class="search-wrapper d-none d-md-flex flex-grow-1 me-3" style="max-width:280px;">
      <div class="input-group">
        <span class="input-group-text bg-search border-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input type="text" class="form-control bg-search border-0"
               placeholder="Search students, skills..."
               id="globalSearch" autocomplete="off">
      </div>
    </div>

    <div class="ms-auto d-flex align-items-center gap-1">
      {% if user.is_authenticated %}
        <!-- Search icon (mobile only) -->
        <a href="{% url 'search:explore' %}" class="nav-icon-btn d-md-none">
          <i class="bi bi-search"></i>
        </a>
        <!-- Notifications -->
        <a href="{% url 'notifications:notifications' %}" class="nav-icon-btn position-relative">
          <i class="bi bi-bell"></i>
          <span class="badge-count" id="notifBadge" 
                style="display: {% if unread_notifications_count > 0 %}inline-block{% else %}none{% endif %};">
            {{ unread_notifications_count }}
          </span>
        </a>
        <!-- Profile dropdown -->
        <div class="dropdown">
          <button class="nav-icon-btn p-0 border-0 bg-transparent dropdown-toggle" 
                  type="button" 
                  id="profileDropdown" 
                  data-bs-toggle="dropdown" 
                  aria-expanded="false"
                  aria-haspopup="true">
            <img src="{{ request.user.profile.get_avatar_url }}"
                 class="rounded-circle" width="32" height="32"
                 style="object-fit:cover;">
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="profileDropdown">
            <li class="px-3 py-2 border-bottom">
              <div class="fw-600 text-dark">{{ request.user.full_name }}</div>
              <div class="text-muted small">{{ request.user.role }}</div>
            </li>
            <li><a class="dropdown-item" href="{% url 'accounts:my_profile' %}">
              <i class="bi bi-person me-2"></i>View Profile</a></li>
            <li><a class="dropdown-item" href="{% url 'accounts:settings' %}">
              <i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
              <i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-primary-cc px-4 py-1 rounded-pill">Login</a>
      {% endif %}
    </div>

  </div>
</nav>
