<a href="{% url 'accounts:user_profile' user_obj.username %}" class="d-flex align-items-center gap-3 text-decoration-none text-dark">
  <div class="avatar-placeholder" style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; font-size: 1.2rem; flex-shrink: 0;">
    {% if user_obj.profile.profile_picture %}
      <img src="{{ user_obj.profile.profile_picture.url }}" class="w-100 h-100" style="object-fit: cover;">
    {% else %}
      {{ user_obj.full_name|slice:":1"|upper }}
    {% endif %}
  </div>
  <div class="d-flex flex-column">
    <span class="fw-bold fs-6">{{ user_obj.full_name|default:user_obj.username }}</span>
    <small class="text-muted" style="font-size: 0.8rem;">
      {% if user_obj.department %}{{ user_obj.department }}{% else %}@{{ user_obj.username }}{% endif %}
    </small>
  </div>
</a>
